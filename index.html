<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor Pro | Next Gen</title>
    <style>
        :root {
            --bg: #0b0f17;
            --glass: rgba(18, 24, 38, 0.7);
            --accent: #5ee0ff;
            --text: #e4eaf2;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .card {
            width: 90%; max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        textarea, .out {
            width: 100%; height: 120px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #222b3d;
            color: white; padding: 15px; border-radius: 12px;
            font-size: 16px; outline: none; margin-bottom: 10px;
        }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        button {
            background: #222b3d; border: none; color: var(--accent);
            padding: 8px 15px; border-radius: 8px; cursor: pointer;
            transition: 0.3s; font-size: 12px;
        }
        button:hover { background: var(--accent); color: var(--bg); }
        .history { margin-top: 20px; font-size: 12px; color: #6b7890; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin-top:0">Traductor Pro</h3>
    <textarea id="input" placeholder="Escribe algo..."></textarea>
    <div id="output" class="out">Traducción...</div>
    
    <div class="actions">
        <button onclick="copiarTexto()">📋 Copiar</button>
        <button onclick="reproducirVoz()">🔊 Escuchar</button>
        <button onclick="cambiarIdioma()">⇄ Cambiar Idioma</button>
    </div>

    <div class="history" id="history">
        <strong>Historial:</strong>
        <ul id="historyList"></ul>
    </div>
</div>

<script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    let esToEn = true;

    // Función de traducción
    input.addEventListener('input', async () => {
        const text = input.value;
        if(text.length < 3) return;
        
        const lang = esToEn ? 'es|en' : 'en|es';
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${lang}`);
        const data = await res.json();
        output.textContent = data.responseData.translatedText;
        guardarEnHistorial(text, data.responseData.translatedText);
    });

    // Acción: Copiar
    function copiarTexto() {
        navigator.clipboard.writeText(output.textContent);
        alert("¡Texto copiado!");
    }

    // Acción: Voz (TTS)
    function reproducirVoz() {
        const msg = new SpeechSynthesisUtterance(output.textContent);
        msg.lang = esToEn ? 'en-US' : 'es-ES';
        window.speechSynthesis.speak(msg);
    }

    // Acción: Historial
    function guardarEnHistorial(original, trad) {
        const list = document.getElementById('historyList');
        const item = document.createElement('li');
        item.textContent = `${original} -> ${trad}`;
        list.prepend(item);
        if(list.children.length > 3) list.lastChild.remove();
    }

    function cambiarIdioma() {
        esToEn = !esToEn;
        alert("Modo cambiado");
    }
</script>

</body>
</html>
