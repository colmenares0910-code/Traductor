<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traductor Local | Offline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f17;
    --glass: rgba(18, 24, 38, 0.7);
    --accent: #5ee0ff;
    --accent-dim: rgba(94, 224, 255, 0.15);
    --text: #e4eaf2;
    --muted: #6b7890;
    --border: #222b3d;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; margin: 0; padding: 24px;
  }
  .card {
    width: 100%; max-width: 560px;
    background: var(--glass);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 28px; border-radius: 20px;
  }
  .header-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
  h3 { margin: 0; font-family: 'DM Serif Display', serif; font-weight: 400; font-size: 22px; }
  .badge { font-size: 10px; color: var(--muted); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; }
  .lang-row { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
  .lang-select-wrap { flex: 1; position: relative; }
  select.lang-select {
    width: 100%; appearance: none; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 10px; font-size: 13px; cursor: pointer;
  }
  textarea, .out {
    width: 100%; min-height: 110px; background: rgba(0,0,0,0.3);
    border: 1px solid var(--border); color: var(--text); padding: 14px;
    border-radius: 12px; font-size: 15px; outline: none; resize: vertical;
  }
  .actions { display: flex; gap: 10px; margin-top: 14px; }
  button.action {
    background: #222b3d; border: none; color: var(--accent);
    padding: 9px 16px; border-radius: 8px; cursor: pointer; font-size: 12.5px;
  }
  button.action:hover { background: var(--accent); color: var(--bg); }
</style>
</head>
<body>
<div class="card">
  <div class="header-row">
    <h3>Traductor Pro</h3>
    <span class="badge">Local Engine</span>
  </div>

  <div class="lang-row">
    <div class="lang-select-wrap">
      <select class="lang-select" id="fromSelect"></select>
    </div>
    <button class="action" id="swapBtn">⇄</button>
    <div class="lang-select-wrap">
      <select class="lang-select" id="toSelect"></select>
    </div>
  </div>

  <textarea id="input" placeholder="Escribe algo aquí..."></textarea>
  <div style="margin: 15px 0;"><span>Traducción:</span></div>
  <div id="output" class="out">La traducción aparecerá aquí al procesar...</div>

  <div class="actions">
    <button class="action" onclick="procesarTraduccion()">⚙️ Traducir Localmente</button>
    <button class="action" onclick="limpiar()">🗑️ Limpiar</button>
  </div>
</div>

<script>
  const LANGUAGES = { es: 'Español', en: 'Inglés', fr: 'Francés' };
  const input = document.getElementById('input');
  const output = document.getElementById('output');

  function poblar() {
    const selects = [document.getElementById('fromSelect'), document.getElementById('toSelect')];
    selects.forEach(sel => {
      Object.keys(LANGUAGES).forEach(code => {
        const opt = document.createElement('option');
        opt.value = code; opt.textContent = LANGUAGES[code];
        sel.appendChild(opt);
      });
    });
  }

  function procesarTraduccion() {
    const texto = input.value;
    // AQUÍ es donde puedes añadir tu lógica local (ej: if/else, arrays de diccionarios)
    // Sin API, no hay conexión externa.
    output.textContent = "Simulación: El texto '" + texto + "' ha sido procesado localmente.";
  }

  function limpiar() { input.value = ''; output.textContent = '...'; }

  poblar();
</script>
</body>
</html>
